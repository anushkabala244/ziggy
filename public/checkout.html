<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZIGGY 🍴 - Checkout</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <!-- Navigation -->
    <nav>
    <div class="logo">ZIGGY 🍴</div>
    <div class="nav-links" id="navLinks">
      <a href="home.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="cart.html">Cart</a>
      <a href="checkout.html">Checkout</a>
      <a href="request.html">Request Food</a>
    </div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="hamburger-menu" id="hamburgerMenu">
      <a href="home.html" class="mobile-only">Home</a>
      <a href="menu.html" class="mobile-only">Menu</a>
      <a href="cart.html" class="mobile-only">Cart</a>
      <a href="checkout.html" class="mobile-only">Checkout</a>
      <a href="request.html" class="mobile-only">Request Food</a>
      <a href="about.html">About Us</a>
      <a href="feedback.html">Feedback</a>
      <a href="#" onclick="signOut()">Sign Out</a>
    </div>
  </nav>

  <!-- Checkout Section -->
  <section class="request-section">
    <div class="glass-form">
      <h2>Checkout</h2>
      <form id="checkoutForm">
        <div class="form-group">
          <label for="address">Delivery Address:</label>
          <input type="text" id="address" name="address" placeholder="Enter your full address" required>
        </div>

        <div class="form-group">
          <label for="payment">Payment Method:</label>
          <select id="payment" name="payment" required>
            <option value="">Select Payment Method</option>
            <option value="UPI">UPI</option>
            <option value="Card">Card</option>
            <option value="COD">Cash on Delivery</option>
          </select>
        </div>

        <button type="submit" class="submit-btn">Pay Now</button>
      </form>
    </div>
  </section>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("hamburgerMenu");
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }

    function signOut() {
      localStorage.removeItem("ziggyEmail");
      Swal.fire("Signed Out", "You have been logged out.", "success").then(() => {
        window.location.href = "/login.html";
      });
    }

    document.getElementById("checkoutForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = localStorage.getItem("ziggyEmail");
      if (!email) {
        return Swal.fire("Error", "Please login first", "error");
      }

      const address = document.getElementById("address").value;
      const payment = document.getElementById("payment").value;

      const res = await fetch('/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, address, payment })
      });
      const data = await res.json();

      if (data.success) {
        Swal.fire("Success", data.message, "success").then(() => {
          window.location.href = data.next || "/home.html";
        });
      } else {
        Swal.fire("Error", data.message, "error");
      }
    });
  </script>
</body>
</html>
